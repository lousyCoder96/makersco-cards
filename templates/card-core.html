<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b0f1a">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <style>
        :root {
            --bg-base: #0b0f1a;
            --bg-elev-1: #111827;
            --bg-elev-2: #1a2233;
            --surface-card: #141b2d;
            --surface-card-back: #161e33;
            --border-subtle: rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.12);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-gold: #c9a961;
            --accent-gold-soft: #8a7340;
            --accent-action: #4f6cb8;
            --success: #5b9a7a;
            --shadow-card: 0 20px 60px -20px rgba(0,0,0,0.6);
            --shadow-glow: 0 0 40px rgba(201,169,97,0.08);
            
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --fs-hero: clamp(24px, 5vw, 32px);
            --fs-h2: 16px;
            --fs-body: 14px;
            --fs-label: 11px;
            
            --s-1: 4px;
            --s-2: 8px;
            --s-3: 12px;
            --s-4: 16px;
            --s-5: 20px;
            --s-6: 24px;
            --s-8: 32px;
            --s-10: 40px;
            --s-12: 48px;
            
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --dur-fast: 180ms;
            --dur-base: 240ms;
            --dur-flip: 700ms;
            
            --radius-card: 20px;
            --radius-btn: 12px;
            --radius-pill: 20px;
            --touch-min: 44px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .app {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: var(--s-6) var(--s-4) var(--s-10);
            position: relative;
        }
        
        .bg-aura {
            position: fixed;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(201,169,97,0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }
        
        .card-stage {
            perspective: 1200px;
            width: 100%;
            aspect-ratio: 1.586 / 1;
            margin-bottom: var(--s-6);
            position: relative;
            z-index: 1;
        }
        
        @media (max-width: 379px) {
            .card-stage {
                aspect-ratio: 1 / 1.4;
            }
        }
        
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-spring);
            cursor: pointer;
        }
        
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        
        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            padding: var(--s-6);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }
        
        .card-face--front {
            background: var(--surface-card);
            border: 1px solid var(--border-subtle);
        }
        
        .card-face--back {
            background: var(--surface-card-back);
            border: 1px solid var(--border-subtle);
            transform: rotateY(180deg);
        }
        
        .card-face__inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }
        
        .card-face__corner {
            position: absolute;
            top: var(--s-6);
            right: var(--s-6);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-elev-2);
            border: 1px solid var(--border-strong);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: -0.02em;
        }
        
        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: var(--bg-elev-2);
            border: 2px solid var(--border-strong);
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .avatar__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .identity {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--s-2);
        }
        
        .identity__name {
            font-size: var(--fs-hero);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: var(--text-primary);
        }
        
        .identity__title {
            font-size: var(--fs-h2);
            font-weight: 600;
            color: var(--accent-gold);
            letter-spacing: -0.01em;
        }
        
        .identity__company {
            font-size: var(--fs-body);
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: var(--s-2);
            padding: 2px 10px;
            border-radius: var(--radius-pill);
            font-size: var(--fs-label);
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            width: fit-content;
            margin-top: var(--s-2);
        }
        
        .badge--status {
            display: none;
        }
        
        .card__hint {
            display: none;
        }

        .card-stage::after {
            content: 'TAP TO FLIP';
            display: block;
            text-align: center;
            font-size: var(--fs-label);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            opacity: 0.6;
            margin-top: var(--s-3);
        }
        
        .tagline {
            font-size: var(--fs-body);
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: var(--s-3);
        }
        
        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: var(--s-4);
            margin-bottom: var(--s-5);
        }
        
        .contact-row {
            display: flex;
            flex-direction: column;
            gap: var(--s-1);
        }
        
        .contact-row__label {
            font-size: var(--fs-label);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }
        
        .contact-row__value {
            font-size: var(--fs-body);
            color: var(--text-primary);
            font-weight: 400;
            text-decoration: none;
            transition: color var(--dur-fast) var(--ease-smooth);
        }
        
        .contact-row__value:hover {
            color: var(--accent-gold);
        }
        
        .qr-wrap {
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--s-4);
            background: white;
            border-radius: var(--radius-btn);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        #qrcode {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #qrcode img {
            display: block;
        }
        
        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--s-3);
            margin-top: var(--s-6);
            position: relative;
            z-index: 1;
        }
        
        @media (min-width: 768px) {
            .actions {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .btn {
            min-height: var(--touch-min);
            min-width: var(--touch-min);
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-btn);
            font-family: var(--font-sans);
            font-size: var(--fs-body);
            font-weight: 600;
            cursor: pointer;
            transition: transform var(--dur-fast) var(--ease-smooth), 
                        opacity var(--dur-fast) var(--ease-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--s-2);
            text-decoration: none;
            background: var(--bg-elev-1);
            color: var(--text-primary);
            border: 1px solid var(--border-strong);
        }
        
        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn:focus-visible {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
        }
        
        .btn--primary {
            background: var(--accent-action);
            border-color: var(--accent-action);
            color: white;
        }
        
        .btn--accent {
            background: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            font-weight: 700;
        }
        
        .btn-ghost {
            min-height: var(--touch-min);
            padding: 12px 16px;
            background: var(--bg-elev-1);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-btn);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: var(--fs-body);
            font-weight: 500;
            cursor: pointer;
            transition: transform var(--dur-fast) var(--ease-smooth),
                        border-color var(--dur-fast) var(--ease-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--s-2);
            flex: 1;
            min-width: 96px;
        }
        
        .btn-ghost:hover {
            transform: translateY(-1px);
            border-color: var(--border-strong);
        }
        
        .btn-ghost:active {
            transform: scale(0.97);
        }
        
        .btn-ghost:focus-visible {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
        }
        
        .share-panel {
            margin-top: var(--s-8);
            padding: var(--s-5);
            background: var(--bg-elev-1);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-card);
            position: relative;
            z-index: 1;
        }
        
        .share-panel__title {
            font-size: var(--fs-h2);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--s-4);
            letter-spacing: -0.01em;
        }
        
        .share-panel__row {
            display: flex;
            gap: var(--s-2);
            flex-wrap: wrap;
        }
        
        .toast {
            position: fixed;
            bottom: var(--s-8);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface-card);
            border: 1px solid var(--border-strong);
            padding: var(--s-4) var(--s-6);
            border-radius: var(--radius-btn);
            font-size: var(--fs-body);
            font-weight: 600;
            color: var(--text-primary);
            box-shadow: var(--shadow-card);
            z-index: 1000;
            opacity: 0;
            transition: transform var(--dur-base) var(--ease-smooth),
                        opacity var(--dur-base) var(--ease-smooth);
            pointer-events: none;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            
            .card {
                transition: none;
            }
            
            .card-face--front {
                transition: opacity 200ms ease;
            }
            
            .card.is-flipped .card-face--front {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="bg-aura"></div>
        
        <section class="card-stage">
            <div class="card" role="button" tabindex="0" aria-pressed="false" aria-label="Business card, tap to flip" data-flipped="false">
                <article class="card-face card-face--front">
                    <div class="card-face__inner">
                        <div class="avatar">
                            <img class="avatar__img" src="" alt="Profile photo" id="avatarImg">
                        </div>
                        <div class="identity">
                            <h1 class="identity__name" id="cardName"></h1>
                            <p class="identity__title" id="cardTitle"></p>
                            <p class="identity__company" id="cardCompany"></p>
                        </div>
                        <span class="badge badge--status" id="statusBadge"></span>
                        <div class="card__hint">Tap to flip</div>
                    </div>
                    <div class="card-face__corner" id="monogramFront"></div>
                </article>
                
                <article class="card-face card-face--back">
                    <div class="card-face__inner">
                        <p class="tagline" id="cardTagline"></p>
                        <ul class="contact-list">
                            <li class="contact-row" data-type="phone">
                                <span class="contact-row__label">Phone</span>
                                <a href="#" class="contact-row__value" id="contactPhone"></a>
                            </li>
                            <li class="contact-row" data-type="email">
                                <span class="contact-row__label">Email</span>
                                <a href="#" class="contact-row__value" id="contactEmail"></a>
                            </li>
                            <li class="contact-row" data-type="location">
                                <span class="contact-row__label">Location</span>
                                <span class="contact-row__value" id="contactLocation"></span>
                            </li>
                        </ul>
                        <div class="qr-wrap" aria-label="QR code linking to website">
                            <div id="qrcode"></div>
                        </div>
                    </div>
                </article>
            </div>
        </section>
        
        <nav class="actions" aria-label="Contact actions">
            <button class="btn btn--primary" data-action="call">
                <span>Call</span>
            </button>
            <button class="btn btn--primary" data-action="email">
                <span>Email</span>
            </button>
            <button class="btn btn--primary" data-action="whatsapp">
                <span>WhatsApp</span>
            </button>
            <button class="btn btn--accent" data-action="save">
                <span>Save Contact</span>
            </button>
        </nav>
        
        <section class="share-panel">
            <h2 class="share-panel__title">Share</h2>
            <div class="share-panel__row">
                <button class="btn-ghost" data-share="copy">Copy link</button>
                <button class="btn-ghost" data-share="whatsapp">WhatsApp</button>
                <button class="btn-ghost" data-share="sms">SMS</button>
            </div>
        </section>
        
        <div class="toast" role="status" aria-live="polite" hidden id="toast"></div>
    </main>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            pronouns: "He/Him",
            photo: "",
            color: "#6366f1",
            style: "dark-luxury",
            whatsapp_message: "Hi Faris, I found your digital card and would like to connect!",
            linkedin: "",
            instagram: "",
            social: { linkedin: "", instagram: "", facebook: "", twitter: "", tiktok: "", youtube: "", pinterest: "" },
            gallery: [],
            video_url: "",
            video_caption: "",
            booking_url: "",
            maps_url: "",
            custom_links: [],
            status: "Available",
            monogram: "AF",
            tagline: "Building digital solutions for Malaysian SMEs",
            whatsapp: "60123456789",
            vcard: {
                firstName: "Ahmad Faris",
                lastName: "bin Razak",
                org: "Pixel Reka Sdn Bhd",
                role: "Founder & CEO"
            }
        };
        
        function init() {
            hydrate();
            initQR();
            wireListeners();
        }
        
        function hydrate() {
            document.title = `${CONFIG.name} - Digital Business Card`;
            
            const nameEl = document.getElementById('cardName');
            const titleEl = document.getElementById('cardTitle');
            const companyEl = document.getElementById('cardCompany');
            const taglineEl = document.getElementById('cardTagline');
            const statusEl = document.getElementById('statusBadge');
            const monogramEl = document.getElementById('monogramFront');
            const phoneEl = document.getElementById('contactPhone');
            const emailEl = document.getElementById('contactEmail');
            const locationEl = document.getElementById('contactLocation');
            const avatarEl = document.getElementById('avatarImg');
            
            if (nameEl) nameEl.textContent = CONFIG.name;
            if (titleEl) titleEl.textContent = CONFIG.title;
            if (companyEl) companyEl.textContent = CONFIG.company;
            if (taglineEl) taglineEl.textContent = CONFIG.tagline;
            if (statusEl) statusEl.textContent = CONFIG.status;
            if (monogramEl) monogramEl.textContent = CONFIG.monogram;
            
            if (phoneEl) {
                phoneEl.textContent = CONFIG.phone;
                phoneEl.href = `tel:${CONFIG.phone}`;
            }
            
            if (emailEl) {
                emailEl.textContent = CONFIG.email;
                emailEl.href = `mailto:${CONFIG.email}`;
            }
            
            if (locationEl) {
                locationEl.textContent = CONFIG.location;
            }
            
            if (avatarEl && CONFIG.photo) {
                avatarEl.src = CONFIG.photo;
            } else if (avatarEl) {
                avatarEl.style.display = 'none';
            }
        }
        
        function wireListeners() {
            const card = document.querySelector('.card');
            if (card) {
                card.addEventListener('click', flipCard);
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        flipCard();
                    }
                });
            }
            
            const callBtn = document.querySelector('[data-action="call"]');
            const emailBtn = document.querySelector('[data-action="email"]');
            const whatsappBtn = document.querySelector('[data-action="whatsapp"]');
            const saveBtn = document.querySelector('[data-action="save"]');
            
            if (callBtn) callBtn.addEventListener('click', callPhone);
            if (emailBtn) emailBtn.addEventListener('click', emailContact);
            if (whatsappBtn) whatsappBtn.addEventListener('click', () => openWhatsApp(CONFIG.whatsapp_message));
            if (saveBtn) saveBtn.addEventListener('click', downloadVCard);
            
            const copyShareBtn = document.querySelector('[data-share="copy"]');
            const whatsappShareBtn = document.querySelector('[data-share="whatsapp"]');
            const smsShareBtn = document.querySelector('[data-share="sms"]');
            
            if (copyShareBtn) copyShareBtn.addEventListener('click', copyLink);
            if (whatsappShareBtn) whatsappShareBtn.addEventListener('click', () => {
                const shareText = `Check out ${CONFIG.name}'s digital business card: ${CONFIG.website}`;
                openWhatsApp(shareText);
            });
            if (smsShareBtn) smsShareBtn.addEventListener('click', () => {
                const shareText = `Check out ${CONFIG.name}'s digital business card: ${CONFIG.website}`;
                openSMS(shareText);
            });
        }
        
        function flipCard() {
            const card = document.querySelector('.card');
            if (!card) return;
            
            const isFlipped = card.classList.toggle('is-flipped');
            card.setAttribute('aria-pressed', isFlipped.toString());
            card.setAttribute('data-flipped', isFlipped.toString());
        }
        
        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `N:${CONFIG.vcard.lastName};${CONFIG.vcard.firstName};;;`,
                `ORG:${CONFIG.vcard.org}`,
                `TITLE:${CONFIG.vcard.role}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `ADR;TYPE=WORK:;;${CONFIG.location};;;;`,
                `NOTE:${CONFIG.tagline}`,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }
        
        function downloadVCard() {
            const vcardContent = generateVCard();
            const blob = new Blob([vcardContent], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.vcard.firstName}-${CONFIG.vcard.lastName}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('Contact saved');
        }
        
        function initQR() {
            if (typeof QRCode === 'undefined') {
                console.warn('QRCode library not loaded');
                return;
            }
            
            const qrContainer = document.getElementById('qrcode');
            if (qrContainer) {
                new QRCode(qrContainer, {
                    text: CONFIG.website,
                    width: 132,
                    height: 132,
                    colorDark: '#0b0f1a',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            }
        }
        
        function callPhone() {
            window.location.href = `tel:${CONFIG.phone}`;
        }
        
        function emailContact() {
            window.location.href = `mailto:${CONFIG.email}`;
        }
        
        function openWhatsApp(text) {
            const url = `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }
        
        function openSMS(text) {
            window.location.href = `sms:?&body=${encodeURIComponent(text)}`;
        }
        
        function copyLink() {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(window.location.href)
                    .then(() => {
                        showToast('Link copied');
                    })
                    .catch(() => {
                        showToast('Failed to copy');
                    });
            } else {
                showToast('Clipboard not supported');
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            
            toast.textContent = message;
            toast.hidden = false;
            
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.hidden = true;
                }, 240);
            }, 1800);
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
