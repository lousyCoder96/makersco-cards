<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #0a0a0a;
            --card-front-a: #1a1a1a;
            --card-front-b: #0d0d0d;
            --card-back: #111111;
            --surface-raised: #161616;
            --accent: #C9A962;
            --accent-soft: rgba(201, 169, 98, 0.12);
            --accent-line: rgba(201, 169, 98, 0.27);
            --hairline: rgba(201, 169, 98, 0.18);
            --text-primary: #EDE6D3;
            --text-secondary: #A89F8C;
            --text-muted: #6B6357;
            --shadow-card: 0 24px 60px -20px rgba(0, 0, 0, 0.75),
                          0 0 0 1px rgba(201, 169, 98, 0.27) inset;
            --radius-card: 16px;
            --radius-badge: 20px;
            --ease-luxe: cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .card-wrapper {
            width: 340px;
            height: 540px;
            perspective: 1000px;
            margin: 0 auto 32px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .card-wrapper {
                width: 380px;
                height: 600px;
            }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 280ms var(--ease-luxe);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 32px;
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(165deg, var(--card-front-a) 0%, var(--card-front-b) 100%);
            display: flex;
            flex-direction: column;
        }

        .card-back {
            background: var(--card-back);
            transform: rotateY(180deg);
        }

        /* Corner brackets - only top-right and bottom-left */
        .card-front::before,
        .card-front::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid var(--accent-line);
        }

        .card-front::before {
            top: 16px;
            right: 16px;
            border-left: none;
            border-bottom: none;
        }

        .card-front::after {
            bottom: 16px;
            left: 16px;
            border-right: none;
            border-top: none;
        }

        /* Top hairline rule */
        .top-rule {
            width: 48px;
            height: 1px;
            background: var(--accent);
            margin-bottom: 24px;
        }

        /* Monogram */
        .monogram {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            animation: fadeRise 240ms var(--ease-luxe) both;
        }

        @keyframes fadeRise {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spacer {
            flex: 1;
        }

        /* Name section */
        .name-section {
            margin-top: auto;
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        @media (min-width: 768px) {
            .name {
                font-size: 34px;
            }
        }

        .title {
            font-size: 14px;
            font-weight: 300;
            font-style: italic;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            .title {
                font-size: 15px;
            }
        }

        /* Divider hairline */
        .divider {
            width: 32px;
            height: 1px;
            background: var(--accent);
            margin-bottom: 16px;
        }

        .company {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        @media (min-width: 768px) {
            .company {
                font-size: 13px;
            }
        }

        .location {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        /* Card Back - Contact Section */
        .contact-header {
            margin-bottom: 8px;
        }

        .contact-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.28em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .header-rule {
            width: 48px;
            height: 1px;
            background: var(--accent);
            margin-bottom: 24px;
        }

        .contact-rows {
            display: flex;
            flex-direction: column;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 16px 1fr;
            column-gap: 12px;
            min-height: 56px;
            align-items: start;
            padding: 12px 0;
            border-bottom: 1px solid var(--hairline);
            transition: opacity 160ms var(--ease-luxe);
        }

        .contact-row:last-child {
            border-bottom: none;
        }

        .contact-row:hover {
            opacity: 0.8;
        }

        /* Diamond marker */
        .marker {
            width: 8px;
            height: 8px;
            background: var(--accent);
            transform: rotate(45deg);
            margin-top: 6px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .contact-info-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }

        .contact-info-value {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            word-break: break-word;
            text-decoration: none;
            display: block;
        }
        .contact-info-value:hover {
            color: var(--accent-gold);
        }

        /* QR Code section on back */
        .qr-section {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .qr-container {
            background: white;
            padding: 12px;
            border-radius: 8px;
            display: inline-flex;
        }

        .qr-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.28em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .actions {
                max-width: 380px;
            }
        }

        .btn {
            height: 48px;
            padding: 0 24px;
            border-radius: 4px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 180ms var(--ease-luxe),
                       opacity 180ms var(--ease-luxe);
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--hairline);
        }

        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent-soft);
            opacity: 0;
            transition: opacity 180ms var(--ease-luxe);
        }

        .btn-secondary:hover::before {
            opacity: 1;
        }

        .btn-secondary span {
            position: relative;
            z-index: 1;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 4px 12px;
            font-weight: 700;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--accent-line);
            margin-top: 8px;
        }

        /* Flip instruction */
        .flip-hint {
            text-align: center;
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            margin-top: 24px;
            text-transform: uppercase;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface-raised);
            color: var(--text-primary);
            padding: 16px 24px;
            border-radius: 8px;
            border: 1px solid var(--accent-line);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.02em;
            opacity: 0;
            transition: all 280ms var(--ease-luxe);
            z-index: 1000;
            box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.6);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Bio section on back */
        .bio-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--hairline);
        }

        .bio-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.28em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .bio-text {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            line-height: 1.6;
        }

        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Loading state */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-wrapper" id="cardWrapper">
            <div class="card-inner" id="cardInner">
                <!-- Card Front -->
                <div class="card-face card-front">
                    <div class="top-rule"></div>
                    <div class="monogram" id="monogram">AF</div>
                    <div class="spacer"></div>
                    <div class="name-section">
                        <h1 class="name" id="fullName">Ahmad Faris bin Razak</h1>
                        <p class="title" id="titleText">Founder & Chief Executive Officer</p>
                        <div class="divider"></div>
                        <p class="company" id="companyName">Pixel Reka Sdn Bhd</p>
                        <p class="location" id="locationText">Kuala Lumpur, Malaysia</p>
                    </div>
                </div>

                <!-- Card Back -->
                <div class="card-face card-back">
                    <div class="contact-header">
                        <div class="contact-label">Contact</div>
                        <div class="header-rule"></div>
                    </div>

                    <div class="contact-rows">
                        <div class="contact-row">
                            <div class="marker"></div>
                            <div class="contact-info">
                                <div class="contact-info-label">Direct</div>
                                <a class="contact-info-value" id="phoneDisplay" href="#">+60 12 345 6789</a>
                            </div>
                        </div>

                        <div class="contact-row">
                            <div class="marker"></div>
                            <div class="contact-info">
                                <div class="contact-info-label">Email</div>
                                <a class="contact-info-value" id="emailDisplay" href="#">faris@pixelreka.com.my</a>
                            </div>
                        </div>

                        <div class="contact-row">
                            <div class="marker"></div>
                            <div class="contact-info">
                                <div class="contact-info-label">Website</div>
                                <a class="contact-info-value" id="websiteDisplay" href="#" target="_blank" rel="noopener noreferrer">pixelreka.com.my</a>
                            </div>
                        </div>
                    </div>

                    <div class="bio-section">
                        <div class="bio-label">About</div>
                        <p class="bio-text" id="bioText">Building digital solutions for Malaysian SMEs</p>
                    </div>

                    <div class="qr-section">
                        <div class="qr-container">
                            <div id="qrcode"></div>
                        </div>
                        <div class="qr-label">Scan to Save</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="downloadVCard">
                <span>Save Contact</span>
            </button>

            <div class="btn-row">
                <button class="btn btn-secondary" id="copyLink">
                    <span>Copy Link</span>
                </button>
                <button class="btn btn-secondary" id="shareBtn">
                    <span>Share</span>
                </button>
            </div>

            <a class="btn btn-secondary" id="whatsappBtn" href="#" target="_blank" rel="noopener noreferrer">
                <span>WhatsApp</span>
            </a>
        </div>

        <p class="flip-hint">Tap card to flip</p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Configuration
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#C9A962",
            whatsapp_message: "Hi Faris, I found your digital card!",
            social: { linkedin: "", instagram: "", facebook: "", twitter: "", tiktok: "", youtube: "", pinterest: "" },
            gallery: [],
            video_url: "",
            video_caption: "",
            booking_url: "",
            maps_url: "",
            custom_links: []
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeCard();
            initializeQRCode();
            initializeEventListeners();
        });

        // Initialize card content
        function initializeCard() {
            // Generate monogram from name
            const nameParts = CONFIG.name.split(' ');
            const monogram = (nameParts[0][0] + (nameParts[1] ? nameParts[1][0] : nameParts[0][1])).toUpperCase();
            document.getElementById('monogram').textContent = monogram;

            // Set card content
            document.getElementById('fullName').textContent = CONFIG.name;
            document.getElementById('titleText').textContent = CONFIG.title;
            document.getElementById('companyName').textContent = CONFIG.company;
            document.getElementById('locationText').textContent = CONFIG.location;
            const phoneEl = document.getElementById('phoneDisplay');
            phoneEl.textContent = formatPhoneDisplay(CONFIG.phone);
            phoneEl.href = `tel:${CONFIG.phone.replace(/[^0-9+]/g, '')}`;

            const emailEl = document.getElementById('emailDisplay');
            emailEl.textContent = CONFIG.email;
            emailEl.href = `mailto:${CONFIG.email}`;

            const websiteEl = document.getElementById('websiteDisplay');
            websiteEl.textContent = CONFIG.website.replace('https://', '').replace('http://', '');
            websiteEl.href = CONFIG.website.startsWith('http') ? CONFIG.website : `https://${CONFIG.website}`;
            document.getElementById('bioText').textContent = CONFIG.bio;

            // Set WhatsApp link
            const whatsappUrl = `https://wa.me/${CONFIG.phone.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(CONFIG.whatsapp_message)}`;
            document.getElementById('whatsappBtn').href = whatsappUrl;
        }

        // Format phone number for display
        function formatPhoneDisplay(phone) {
            // Simple formatting for Malaysian numbers: +60 12 345 6789
            const cleaned = phone.replace(/[^0-9+]/g, '');
            if (cleaned.startsWith('+60')) {
                const rest = cleaned.substring(3);
                if (rest.length >= 9) {
                    return `+60 ${rest.substring(0, 2)} ${rest.substring(2, 5)} ${rest.substring(5)}`;
                }
            }
            return phone;
        }

        // Initialize QR Code
        function initializeQRCode() {
            const qrContainer = document.getElementById('qrcode');
            const vCardData = generateVCard();
            
            if (typeof QRCode !== 'undefined') {
                new QRCode(qrContainer, {
                    text: vCardData,
                    width: 120,
                    height: 120,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
            }
        }

        // Generate vCard data
        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `ADR;TYPE=WORK:;;${CONFIG.location}`,
                `NOTE:${CONFIG.bio}`,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }

        // Initialize event listeners
        function initializeEventListeners() {
            const cardWrapper = document.getElementById('cardWrapper');
            const cardInner = document.getElementById('cardInner');
            const downloadBtn = document.getElementById('downloadVCard');
            const copyBtn = document.getElementById('copyLink');
            const shareBtn = document.getElementById('shareBtn');

            // Card flip
            let isFlipped = false;
            cardWrapper.addEventListener('click', function(e) {
                // Don't flip if clicking a button or link
                if (e.target.closest('button') || e.target.closest('a')) {
                    return;
                }
                
                isFlipped = !isFlipped;
                if (isFlipped) {
                    cardInner.classList.add('flipped');
                } else {
                    cardInner.classList.remove('flipped');
                }
            });

            // Download vCard
            downloadBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                downloadVCard();
            });

            // Copy link
            copyBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                copyToClipboard(window.location.href);
            });

            // Share button
            shareBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                shareCard();
            });

            // Keyboard accessibility for card flip
            cardWrapper.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    cardWrapper.click();
                }
            });

            // Make card focusable
            cardWrapper.setAttribute('tabindex', '0');
            cardWrapper.setAttribute('role', 'button');
            cardWrapper.setAttribute('aria-label', 'Flip business card');
        }

        // Download vCard
        function downloadVCard() {
            const vCardData = generateVCard();
            const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            
            const fileName = CONFIG.name.replace(/\s+/g, '_') + '.vcf';
            link.href = url;
            link.download = fileName;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            window.URL.revokeObjectURL(url);
            
            showToast('Contact saved successfully');
        }

        // Copy to clipboard
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        showToast('Link copied to clipboard');
                    })
                    .catch(() => {
                        fallbackCopy(text);
                    });
            } else {
                fallbackCopy(text);
            }
        }

        // Fallback copy method
        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast('Link copied to clipboard');
            } catch (err) {
                showToast('Failed to copy link');
            }
            
            document.body.removeChild(textArea);
        }

        // Share card
        function shareCard() {
            const shareData = {
                title: CONFIG.name,
                text: `${CONFIG.name} - ${CONFIG.title} at ${CONFIG.company}`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData)
                    .then(() => {
                        showToast('Card shared successfully');
                    })
                    .catch((err) => {
                        if (err.name !== 'AbortError') {
                            copyToClipboard(window.location.href);
                        }
                    });
            } else {
                copyToClipboard(window.location.href);
            }
        }

        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Prevent context menu on card (optional)
        document.getElementById('cardWrapper').addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Add touch feedback for mobile
        const buttons = document.querySelectorAll('.btn');
        buttons.forEach(button => {
            button.addEventListener('touchstart', function() {
                this.style.opacity = '0.7';
            });
            
            button.addEventListener('touchend', function() {
                this.style.opacity = '1';
            });
            
            button.addEventListener('touchcancel', function() {
                this.style.opacity = '1';
            });
        });

        // Preload flip animation
        setTimeout(() => {
            document.getElementById('cardInner').style.transition = 'transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1)';
        }, 100);

        // Add entrance animation
        window.addEventListener('load', function() {
            document.querySelector('.card-wrapper').style.opacity = '0';
            document.querySelector('.card-wrapper').style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                document.querySelector('.card-wrapper').style.transition = 'opacity 400ms cubic-bezier(0.22, 0.61, 0.36, 1), transform 400ms cubic-bezier(0.22, 0.61, 0.36, 1)';
                document.querySelector('.card-wrapper').style.opacity = '1';
                document.querySelector('.card-wrapper').style.transform = 'translateY(0)';
            }, 50);
        });
    </script>

    <!-- Phase 4: Interactive components -->
    <div id="booking-container" style="padding:0 20px 8px"></div>
    <div id="social-container" style="padding:0 20px 8px"></div>
    <div id="gallery-container" style="padding:0 20px 16px"></div>
    <div id="video-container" style="padding:0 20px 16px"></div>
    <script type="module">
      import { initBookingLocation } from '../components/booking-location.js';
      import { initSocialLinks } from '../components/social-links.js';
      import { initGallery } from '../components/gallery.js';
      import { initVideoEmbed } from '../components/video-embed.js';
      document.addEventListener('DOMContentLoaded', () => {
        initBookingLocation('booking-container');
        initSocialLinks('social-container');
        initGallery('gallery-container');
        initVideoEmbed('video-container');
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('../service-worker.js');
      }
    </script>
</body>
