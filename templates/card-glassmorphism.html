<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Faris bin Razak - Digital Business Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(ellipse at 50% 0%, #302b63, #0f0c29);
            --bg-solid: #0f0c29;
            --card-front-bg: rgba(255, 255, 255, 0.08);
            --card-back-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.18);
            --card-border-hover: rgba(255, 255, 255, 0.28);
            --accent: #818cf8;
            --accent-soft: rgba(129, 140, 248, 0.18);
            --accent-ring: rgba(129, 140, 248, 0.32);
            --text-primary: rgba(255, 255, 255, 0.96);
            --text-secondary: rgba(255, 255, 255, 0.68);
            --text-muted: rgba(255, 255, 255, 0.44);
            --divider: rgba(255, 255, 255, 0.10);
            --shadow-card: 0 24px 64px rgba(15, 12, 41, 0.48);
            --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.10);
            --blur: 24px;
            --radius-card: 24px;
            --radius-badge: 20px;
            --radius-btn: 12px;
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-flip: cubic-bezier(0.65, 0, 0.35, 1);
            --dur-fast: 160ms;
            --dur-base: 220ms;
            --dur-flip: 600ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-solid);
            z-index: -1;
        }

        .card-wrapper {
            width: 340px;
            height: 260px;
            perspective: 1000px;
            margin: 0 auto 32px;
            cursor: pointer;
            animation: cardMount 280ms var(--ease-out) backwards;
        }

        @keyframes cardMount {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--dur-flip) var(--ease-flip);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius-card);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .card-face::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: var(--radius-card);
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.28), transparent 40%, transparent 60%, rgba(129, 140, 248, 0.24));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card-face::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backdrop-filter: blur(var(--blur)) saturate(140%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(140%);
            border-radius: var(--radius-card);
            pointer-events: none;
            z-index: 0;
        }

        .card-front {
            background: var(--card-front-bg);
            border: 1px solid var(--card-border);
            transition: border-color var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out);
        }

        .card-wrapper:hover .card-front {
            border-color: var(--card-border-hover);
            transform: translateY(-2px) scale(1.005);
        }

        .card-back {
            background: var(--card-back-bg);
            border: 1px solid var(--card-border);
            transform: rotateY(180deg);
        }

        .card-content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .card-front .card-content {
            justify-content: space-between;
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar-container {
            position: relative;
            width: 72px;
            height: 72px;
            margin-bottom: 12px;
        }

        .avatar-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%) scale(1);
            border-radius: 50%;
            background: var(--accent-ring);
            opacity: 0.5;
            filter: blur(12px);
            animation: avatarHalo 2400ms ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes avatarHalo {
            to {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.06);
            }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            object-fit: cover;
            position: relative;
            z-index: 1;
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border: 2px solid var(--card-front-bg);
            border-radius: 50%;
            z-index: 2;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: var(--radius-badge);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: rgba(129, 140, 248, 0.16);
            color: var(--accent);
            border: 1px solid var(--accent-ring);
        }

        .identity-section {
            flex: 1;
            min-width: 0;
        }

        .name {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .title {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .company {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
        }

        .social-icons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            min-width: 32px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--divider);
            cursor: pointer;
            transition: background var(--dur-base) var(--ease-out);
            position: relative;
        }

        .icon-btn::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .icon-btn:active {
            transform: scale(0.98);
            transition: transform 120ms;
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-secondary);
            transition: stroke var(--dur-base);
        }

        .icon-btn:hover svg {
            stroke: var(--accent);
        }

        .flip-hint {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            color: var(--text-muted);
            opacity: 0.6;
            z-index: 2;
        }

        .flip-hint svg {
            width: 10px;
            height: 10px;
            stroke: currentColor;
        }

        .card-back .card-content {
            flex-direction: column;
            padding: 20px;
            gap: 12px;
        }

        .back-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            color: var(--text-muted);
        }

        .contact-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            flex: 1;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--divider);
            border-radius: 10px;
            min-height: 36px;
        }

        .contact-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            stroke: var(--accent);
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .contact-value {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .copy-btn {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background var(--dur-fast);
            position: relative;
        }

        .copy-btn::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 8px;
        }

        .copy-btn:hover {
            background: var(--accent-soft);
        }

        .copy-btn svg {
            width: 12px;
            height: 12px;
            stroke: var(--text-secondary);
        }

        .copy-btn.copied svg {
            stroke: var(--accent);
        }

        .qr-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--divider);
            border-radius: 12px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
        }

        #qrcode canvas {
            border-radius: 8px;
        }

        .actions-container {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: cardMount 280ms var(--ease-out) 60ms backwards;
        }

        .btn-primary {
            width: 100%;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--accent-soft);
            border: 1px solid var(--accent-ring);
            border-radius: var(--radius-btn);
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms var(--ease-out);
            box-shadow: var(--shadow-inset);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .btn-primary:hover {
            background: rgba(129, 140, 248, 0.26);
            border-color: rgba(129, 140, 248, 0.48);
        }

        .btn-primary:active {
            transform: scale(0.98);
            transition: transform 120ms;
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        .action-row {
            display: flex;
            gap: 12px;
        }

        .btn-secondary {
            flex: 1;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--divider);
            border-radius: var(--radius-btn);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms var(--ease-out);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .btn-secondary:active {
            transform: scale(0.98);
            transition: transform 120ms;
        }

        .btn-secondary svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
        }

        .meta-line {
            text-align: center;
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            opacity: 0.6;
            margin-top: 8px;
        }

        @media (max-width: 400px) {
            .card-wrapper,
            .actions-container {
                width: 100%;
                max-width: 340px;
            }

            .name {
                font-size: 18px;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-soft);
            border: 1px solid var(--accent-ring);
            border-radius: var(--radius-btn);
            padding: 12px 20px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            transition: all 300ms var(--ease-out);
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

                            <svg class="contact-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
                            </svg>
                            <div class="contact-info">
                                <div class="contact-label">Website</div>
                                <div class="contact-value" id="websiteValue">pixelreka.com.my</div>
                            </div>
                            <button class="copy-btn" onclick="copyToClipboard('website')" aria-label="Copy website">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>

                        <div class="contact-item">
                            <svg class="contact-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                            </svg>
                            <div class="contact-info">
                                <div class="contact-label">Location</div>
                                <div class="contact-value" id="locationValue">Kuala Lumpur, MY</div>
                            </div>
                            <button class="copy-btn" onclick="copyToClipboard('location')" aria-label="Copy location">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />

                    <div class="qr-container">
                        <div id="qrcode"></div>

            </div>
        </div>
    </div>

    <div class="actions-container">
        <button class="btn-primary" onclick="downloadVCard()">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Save Contact
        </button>

        <div class="action-row">
            <button class="btn-secondary" onclick="openWhatsApp()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 9.75a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 01.778-.332 48.294 48.294 0 005.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z" />
                </svg>
                WhatsApp
            </button>

            <button class="btn-secondary" onclick="copyCardLink()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244" />
                </svg>
                Copy Link
            </button>

            <button class="btn-secondary" onclick="shareCard()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
                </svg>
                Share
            </button>
        </div>

        <div class="meta-line">vcard · v2026.1</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#818cf8",
            whatsapp_message: "Hi Faris, I found your digital card!",
            social: { linkedin: "", instagram: "", facebook: "", twitter: "", tiktok: "", youtube: "", pinterest: "" },
            gallery: [],
            video_url: "",
            video_caption: "",
            booking_url: "",
            maps_url: "",
            custom_links: []
        };

        let isFlipped = false;
        let qrGenerated = false;

        function flipCard() {
            const cardInner = document.getElementById('cardInner');
            isFlipped = !isFlipped;
            cardInner.classList.toggle('flipped');

            if (isFlipped && !qrGenerated) {
                setTimeout(() => {
                    generateQRCode();
                }, 300);
            }
        }

        document.getElementById('cardWrapper').addEventListener('click', function(e) {
            if (!e.target.closest('button') && !e.target.closest('a')) {
                flipCard();
            }
        });

        function generateQRCode() {
            if (qrGenerated) return;
            
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            const vCardData = generateVCardData();
            
            new QRCode(qrContainer, {
                text: vCardData,
                width: 80,
                height: 80,
                colorDark: "#0f0c29",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
            
            qrGenerated = true;
        }

        function generateVCardData() {
            return `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.name}
TITLE:${CONFIG.title}
ORG:${CONFIG.company}
TEL;TYPE=CELL:${CONFIG.phone}
EMAIL:${CONFIG.email}
URL:${CONFIG.website}
ADR:;;${CONFIG.location};;;;
NOTE:${CONFIG.bio}
END:VCARD`;
        }

        function downloadVCard() {
            const vCardData = generateVCardData();
            const blob = new Blob([vCardData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            showToast('Contact saved successfully!');
        }

        function openWhatsApp() {
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const phone = CONFIG.phone.replace(/\+/g, '').replace(/\s/g, '');
            const url = `https://wa.me/${phone}?text=${message}`;
            window.open(url, '_blank');
        }

        function copyCardLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link copied to clipboard!');
            }).catch(() => {
                showToast('Failed to copy link');
            });
        }

        function shareCard() {
            if (navigator.share) {
                navigator.share({
                    title: `${CONFIG.name} - ${CONFIG.title}`,
                    text: `Connect with ${CONFIG.name} from ${CONFIG.company}`,
                    url: window.location.href
                }).catch(() => {
                    copyCardLink();
                });
            } else {
                copyCardLink();
            }
        }

        function copyToClipboard(field) {
            let text = '';
            let btn = null;
            
            switch(field) {
                case 'email':
                    text = CONFIG.email;
                    btn = event.currentTarget;
                    break;
                case 'phone':
                    text = CONFIG.phone;
                    btn = event.currentTarget;
                    break;
                case 'website':
                    text = CONFIG.website;
                    btn = event.currentTarget;
                    break;
                case 'location':
                    text = CONFIG.location;
                    btn = event.currentTarget;
                    break;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                if (btn) {
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.classList.remove('copied');
                    }, 1200);
                }
                showToast(`${field.charAt(0).toUpperCase() + field.slice(1)} copied!`);
            }).catch(() => {
                showToast('Failed to copy');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('displayName').textContent = CONFIG.name;
            document.getElementById('displayTitle').textContent = CONFIG.title;
            document.getElementById('displayCompany').textContent = CONFIG.company;
            document.getElementById('emailValue').textContent = CONFIG.email;
            document.getElementById('phoneValue').textContent = CONFIG.phone.replace(/(\+60)(\d{2})(\d{3})(\d{4})/, '$1 $2-$3 $4');
            document.getElementById('websiteValue').textContent = CONFIG.website.replace('https://', '');
            document.getElementById('locationValue').textContent = CONFIG.location.replace(', Malaysia', ', MY');
        });
    </script>

    <!-- Phase 4: Interactive components -->
    <div id="booking-container" style="padding:0 20px 8px"></div>
    <div id="social-container" style="padding:0 20px 8px"></div>
    <div id="gallery-container" style="padding:0 20px 16px"></div>
    <div id="video-container" style="padding:0 20px 16px"></div>
    <script type="module">
      import { initBookingLocation } from '../components/booking-location.js';
      import { initSocialLinks } from '../components/social-links.js';
      import { initGallery } from '../components/gallery.js';
      import { initVideoEmbed } from '../components/video-embed.js';
      document.addEventListener('DOMContentLoaded', () => {
        initBookingLocation('booking-container');
        initSocialLinks('social-container');
        initGallery('gallery-container');
        initVideoEmbed('video-container');
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('../service-worker.js');
      }
    </script>
</body>
