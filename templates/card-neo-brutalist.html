<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Neo-Brutalist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="../manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Surfaces */
            --bg-page: #FFFBF0;
            --card-front: #FF5C39;
            --card-back: #000000;
            --surface-raised: #FFFFFF;

            /* Ink */
            --ink-primary: #000000;
            --ink-inverse: #FFFBF0;
            --ink-muted: #6B6B6B;

            /* Accent system */
            --accent: #FF5C39;
            --accent-shadow: #C13D1E;
            --accent-tint: #FFE4DC;

            /* Brutalist primitives */
            --border-stroke: 3px solid #000000;
            --shadow-hard: 8px 8px 0 0 #000000;
            --shadow-hard-pressed: 2px 2px 0 0 #000000;
            --radius-card: 4px;
            --radius-badge: 20px;

            /* Motion */
            --ease-snap: cubic-bezier(0.34, 1.2, 0.64, 1);
            --dur-tap: 120ms;
            --dur-flip: 280ms;
        }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg-page);
            color: var(--ink-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-items: center;
        }

        .card-wrapper {
            width: 100%;
            max-width: 360px;
            height: 260px;
            perspective: 1000px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s var(--ease-snap);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border: var(--border-stroke);
            border-radius: var(--radius-card);
            padding: 16px;
            overflow: hidden;
        }

        .card-front {
            background: var(--card-front);
            box-shadow: var(--shadow-hard);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform var(--dur-tap) linear, box-shadow var(--dur-tap) linear;
        }

        .card-wrapper:active .card-front {
            transform: translate3d(6px, 6px, 0);
            box-shadow: var(--shadow-hard-pressed);
        }

        .card-back {
            background: var(--card-back);
            box-shadow: var(--shadow-hard);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-index {
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-primary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--ink-primary);
            border-radius: 50%;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .name-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .name {
            font-weight: 700;
            font-size: 36px;
            line-height: 0.95;
            letter-spacing: -0.03em;
            color: var(--ink-primary);
            text-transform: uppercase;
        }

        .name-divider {
            width: 64px;
            height: 2px;
            background: var(--ink-primary);
            margin: 8px 0 4px 0;
        }

        .title {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-primary);
        }

        .company {
            font-weight: 400;
            font-size: 14px;
            color: var(--ink-primary);
        }

        .back-section-label {
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-inverse);
            margin-bottom: 8px;
        }

        .contact-rows {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
        }

        .contact-row {
            display: grid;
            gap: 4px;
            padding: 8px 0 8px 12px;
            border-left: 3px solid var(--accent);
            min-height: 44px;
        }

        .contact-label {
            font-weight: 700;
            font-size: 11px;
            line-height: 1;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .contact-value {
            font-weight: 400;
            font-size: 15px;
            line-height: 1.2;
            color: var(--ink-inverse);
            word-break: break-word;
        }

        .back-actions {
            display: flex;
            justify-content: center;
            margin-top: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            padding: 12px 20px;
            background: var(--accent);
            color: var(--ink-primary);
            font-weight: 700;
            font-size: 14px;
            line-height: 1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: var(--border-stroke);
            border-radius: var(--radius-card);
            box-shadow: 4px 4px 0 0 var(--ink-primary);
            cursor: pointer;
            transition: transform var(--dur-tap) var(--ease-snap),
                        box-shadow var(--dur-tap) var(--ease-snap);
            text-decoration: none;
            font-family: inherit;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translate3d(4px, 4px, 0);
            box-shadow: 0 0 0 0 var(--ink-primary);
        }

        @media (hover: hover) {
            .btn:hover {
                transform: translate3d(-2px, -2px, 0);
                box-shadow: 6px 6px 0 0 var(--ink-primary);
            }
            
            .btn:hover:active {
                transform: translate3d(4px, 4px, 0);
                box-shadow: 0 0 0 0 var(--ink-primary);
            }
        }

        .btn-secondary {
            background: transparent;
            color: var(--ink-primary);
        }

        .btn-back {
            background: var(--surface-raised);
            color: var(--ink-primary);
            box-shadow: 3px 3px 0 0 var(--accent);
        }

        .btn-back:active {
            box-shadow: 0 0 0 0 var(--accent);
        }

        @media (hover: hover) {
            .btn-back:hover {
                box-shadow: 5px 5px 0 0 var(--accent);
            }
            
            .btn-back:hover:active {
                box-shadow: 0 0 0 0 var(--accent);
            }
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
            max-width: 360px;
        }

        .actions-grid .btn {
            width: 100%;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--surface-raised);
            border: var(--border-stroke);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-hard);
            width: 100%;
            max-width: 360px;
        }

        .qr-label {
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-primary);
        }

        #qrcode {
            padding: 12px;
            background: white;
            border: var(--border-stroke);
            border-radius: var(--radius-card);
        }

        #qrcode canvas,
        #qrcode img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border-radius: var(--radius-badge);
            padding: 4px 12px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            background: var(--ink-primary);
            color: var(--accent);
            border: 2px solid var(--ink-primary);
        }

        .flip-hint {
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-muted);
            text-align: center;
            margin-top: -16px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--ink-primary);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: var(--radius-card);
            border: 2px solid var(--ink-primary);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 0 var(--accent);
            opacity: 0;
            transition: transform 0.3s var(--ease-snap), opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (min-width: 480px) {
            .name {
                font-size: 48px;
            }

            .title {
                font-size: 16px;
            }

            .company {
                font-size: 16px;
            }

            .contact-value {
                font-size: 16px;
            }

            .actions-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 380px) {
            .name {
                font-size: 28px;
            }

            .card-wrapper {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-wrapper" id="cardWrapper">
            <div class="card-inner" id="cardInner">
                <!-- FRONT FACE -->
                <div class="card-face card-front">
                    <div class="card-header">
                        <div class="card-index" id="cardIndex">INDEX No. 01/26</div>
                        <div class="status-dot"></div>
                    </div>
                    <div class="card-content">
                        <div class="name-block">
                            <div class="name" id="cardName">AHMAD<br>FARIS</div>
                            <div class="name-divider"></div>
                            <div class="title" id="cardTitle">FOUNDER & CEO</div>
                            <div class="company" id="cardCompany">Pixel Reka Sdn Bhd</div>
                        </div>
                    </div>
                </div>

                <!-- BACK FACE -->
                <div class="card-face card-back">
                    <div class="back-section-label">CONTACT</div>
                    <div class="contact-rows">
                        <div class="contact-row">
                            <div class="contact-label">EMAIL</div>
                            <div class="contact-value" id="backEmail">faris@pixelreka.com.my</div>
                        </div>
                        <div class="contact-row">
                            <div class="contact-label">PHONE</div>
                            <div class="contact-value" id="backPhone">+60 12 345 6789</div>
                        </div>
                        <div class="contact-row">
                            <div class="contact-label">LOCATION</div>
                            <div class="contact-value" id="backLocation">Kuala Lumpur, Malaysia</div>
                        </div>
                    </div>
                    <div class="back-actions">
                        <button class="btn btn-back" id="saveContactBtn">SAVE CONTACT</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flip-hint">TAP CARD TO FLIP</div>

        <div class="actions-grid">
            <a href="#" class="btn" id="whatsappBtn">
                <span>WHATSAPP</span>
            </a>
            <button class="btn btn-secondary" id="copyLinkBtn">COPY LINK</button>
            <button class="btn btn-secondary" id="shareBtn">SHARE</button>
        </div>

        <div class="qr-section">
            <div class="qr-label">SCAN TO SAVE</div>
            <div id="qrcode"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // CONFIG OBJECT
        const CONFIG = {
            name: "Ahmad Faris bin Razak",
            firstName: "Ahmad Faris",
            title: "Founder & CEO",
            company: "Pixel Reka Sdn Bhd",
            phone: "+60123456789",
            phoneDisplay: "+60 12 345 6789",
            email: "faris@pixelreka.com.my",
            website: "https://pixelreka.com.my",
            location: "Kuala Lumpur, Malaysia",
            bio: "Building digital solutions for Malaysian SMEs",
            color: "#FF5C39",
            whatsapp_message: "Hi Faris, I found your digital card!",
            cardIndex: "INDEX No. 01/26",
            social: { linkedin: "", instagram: "", facebook: "", twitter: "", tiktok: "", youtube: "", pinterest: "" },
            gallery: [],
            video_url: "",
            video_caption: "",
            booking_url: "",
            maps_url: "",
            custom_links: []
        };

        // Initialize card content
        function initializeCard() {
            // Front face
            document.getElementById('cardIndex').textContent = CONFIG.cardIndex;
            
            const nameParts = CONFIG.firstName.split(' ');
            const nameElement = document.getElementById('cardName');
            if (nameParts.length > 1) {
                nameElement.innerHTML = nameParts.map(part => part.toUpperCase()).join('<br>');
            } else {
                nameElement.textContent = CONFIG.firstName.toUpperCase();
            }
            
            document.getElementById('cardTitle').textContent = CONFIG.title.toUpperCase();
            document.getElementById('cardCompany').textContent = CONFIG.company;

            // Back face
            document.getElementById('backEmail').textContent = CONFIG.email;
            document.getElementById('backPhone').textContent = CONFIG.phoneDisplay;
            document.getElementById('backLocation').textContent = CONFIG.location;

            // Update CSS custom property for color
            document.documentElement.style.setProperty('--accent', CONFIG.color);
            document.documentElement.style.setProperty('--card-front', CONFIG.color);
        }

        // Card flip functionality
        const cardWrapper = document.getElementById('cardWrapper');
        const cardInner = document.getElementById('cardInner');
        let isFlipped = false;

        cardWrapper.addEventListener('click', function(e) {
            // Don't flip if clicking on save contact button
            if (e.target.id === 'saveContactBtn' || e.target.closest('#saveContactBtn')) {
                return;
            }
            
            isFlipped = !isFlipped;
            cardInner.classList.toggle('flipped', isFlipped);
        });

        // Generate vCard data
        function generateVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL:${CONFIG.phone}`,
                `EMAIL:${CONFIG.email}`,
                `URL:${CONFIG.website}`,
                `NOTE:${CONFIG.bio}`,
                `ADR;TYPE=WORK:;;${CONFIG.location};;;`,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }

        // Download vCard
        function downloadVCard() {
            const vcard = generateVCard();
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${CONFIG.name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            showToast('Contact saved!');
        }

        // Save contact button
        document.getElementById('saveContactBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            downloadVCard();
        });

        // WhatsApp button
        const whatsappBtn = document.getElementById('whatsappBtn');
        whatsappBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const message = encodeURIComponent(CONFIG.whatsapp_message);
            const phoneClean = CONFIG.phone.replace(/\D/g, '');
            const whatsappURL = `https://wa.me/${phoneClean}?text=${message}`;
            window.open(whatsappURL, '_blank');
        });

        // Copy link button
        document.getElementById('copyLinkBtn').addEventListener('click', function() {
            const currentURL = window.location.href;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentURL).then(function() {
                    showToast('Link copied!');
                }).catch(function() {
                    fallbackCopyTextToClipboard(currentURL);
                });
            } else {
                fallbackCopyTextToClipboard(currentURL);
            }
        });

        // Fallback copy function
        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.top = '-9999px';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast('Link copied!');
                } else {
                    showToast('Copy failed');
                }
            } catch (err) {
                showToast('Copy failed');
            }
            
            document.body.removeChild(textArea);
        }

        // Share button
        document.getElementById('shareBtn').addEventListener('click', async function() {
            const shareData = {
                title: `${CONFIG.name} - ${CONFIG.title}`,
                text: `Connect with ${CONFIG.name} from ${CONFIG.company}`,
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                    showToast('Shared successfully!');
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('Share failed:', err);
                        fallbackShare();
                    }
                }
            } else {
                fallbackShare();
            }
        });

        function fallbackShare() {
            const currentURL = window.location.href;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentURL).then(function() {
                    showToast('Link copied to share!');
                }).catch(function() {
                    showToast('Share not available');
                });
            } else {
                fallbackCopyTextToClipboard(currentURL);
            }
        }

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2500);
        }

        // Generate QR Code
        function generateQRCode() {
            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = '';
            
            const vcard = generateVCard();
            
            new QRCode(qrcodeContainer, {
                text: vcard,
                width: 200,
                height: 200,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Initialize everything on page load
        window.addEventListener('DOMContentLoaded', function() {
            initializeCard();
            
            // Wait a bit for QRCode library to be fully ready
            setTimeout(function() {
                generateQRCode();
            }, 100);
        });

        // Prevent context menu on card for better mobile experience
        cardWrapper.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Add keyboard accessibility for card flip
        cardWrapper.setAttribute('tabindex', '0');
        cardWrapper.setAttribute('role', 'button');
        cardWrapper.setAttribute('aria-label', 'Flip business card');
        
        cardWrapper.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                cardWrapper.click();
            }
        });

        // Prevent double-tap zoom on mobile
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Add visual feedback for mobile tap
        cardWrapper.addEventListener('touchstart', function() {
            cardWrapper.style.opacity = '0.95';
        });

        cardWrapper.addEventListener('touchend', function() {
            setTimeout(function() {
                cardWrapper.style.opacity = '1';
            }, 100);
        });

        // Enhanced vCard with additional fields
        function generateEnhancedVCard() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${CONFIG.name}`,
                `N:${CONFIG.name.split(' ').reverse().join(';')};;;`,
                `ORG:${CONFIG.company}`,
                `TITLE:${CONFIG.title}`,
                `TEL;TYPE=CELL,VOICE:${CONFIG.phone}`,
                `EMAIL;TYPE=INTERNET:${CONFIG.email}`,
                `URL;TYPE=WORK:${CONFIG.website}`,
                `NOTE:${CONFIG.bio}`,
                `ADR;TYPE=WORK:;;${CONFIG.location};;;Malaysia`,
                `REV:${new Date().toISOString()}`,
                'END:VCARD'
            ].join('\n');
            
            return vcard;
        }

        // Log analytics event (placeholder for future implementation)
        function logEvent(eventName, eventData) {
            console.log('Event:', eventName, eventData);
            // Implement analytics tracking here if needed
        }

        // Track card interactions
        cardWrapper.addEventListener('click', function() {
            logEvent('card_flip', { flipped: isFlipped });
        });

        document.getElementById('saveContactBtn').addEventListener('click', function() {
            logEvent('save_contact', { name: CONFIG.name });
        });

        whatsappBtn.addEventListener('click', function() {
            logEvent('whatsapp_click', { name: CONFIG.name });
        });

        document.getElementById('copyLinkBtn').addEventListener('click', function() {
            logEvent('copy_link', { url: window.location.href });
        });

        document.getElementById('shareBtn').addEventListener('click', function() {
            logEvent('share_click', { name: CONFIG.name });
        });
    </script>

    <!-- Phase 4: Interactive components -->
    <div id="booking-container" style="padding:0 20px 8px"></div>
    <div id="social-container" style="padding:0 20px 8px"></div>
    <div id="gallery-container" style="padding:0 20px 16px"></div>
    <div id="video-container" style="padding:0 20px 16px"></div>
    <script type="module">
      import { initBookingLocation } from '../components/booking-location.js';
      import { initSocialLinks } from '../components/social-links.js';
      import { initGallery } from '../components/gallery.js';
      import { initVideoEmbed } from '../components/video-embed.js';
      document.addEventListener('DOMContentLoaded', () => {
        initBookingLocation('booking-container');
        initSocialLinks('social-container');
        initGallery('gallery-container');
        initVideoEmbed('video-container');
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('../service-worker.js');
      }
    </script>
</body>
</html>
